<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャリア戦略設計</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #7c3aed;
    --accent-dim: rgba(124, 58, 237, 0.15);
    --text: #f0f0f0;
    --text-sub: #888;
    --text-dim: #555;
    --user-bg: #1e1535;
    --ai-bg: #1a1a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
  }
  .logo span { color: var(--accent); }

  /* ── STAGE BAR ── */
  #stage-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .stage-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim);
    white-space: nowrap;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .stage-item.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .stage-item.done {
    color: var(--text-sub);
  }
  .stage-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .stage-sep { color: var(--text-dim); font-size: 10px; }

  /* ── CHAT ── */
  #chat-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  #chat-wrap::-webkit-scrollbar { width: 4px; }
  #chat-wrap::-webkit-scrollbar-track { background: transparent; }
  #chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    max-width: 760px;
  }
  .msg.user { flex-direction: row-reverse; margin-left: auto; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    margin-top: 2px;
  }
  .ai-avatar { background: var(--accent); color: #fff; }
  .user-avatar { background: var(--surface2); color: var(--text-sub); border: 1px solid var(--border); }

  .bubble {
    padding: 13px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.75;
    max-width: 600px;
  }
  .ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,58,237,0.3);
    border-top-right-radius: 4px;
  }

  /* Report styles inside bubble */
  .bubble h2 { font-size: 15px; font-weight: 700; margin: 16px 0 8px; color: var(--accent); }
  .bubble h3 { font-size: 13px; font-weight: 700; margin: 14px 0 6px; color: var(--text); }
  .bubble h3::before { content: "■ "; color: var(--accent); }
  .bubble p { margin: 4px 0; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .bubble ul { padding-left: 18px; }
  .bubble li { margin: 4px 0; }
  .bubble strong { color: var(--text); font-weight: 600; }

  /* Typing indicator */
  .typing .bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 16px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT ── */
  #input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  #input-row:focus-within { border-color: var(--accent); }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 24px;
  }
  #user-input::placeholder { color: var(--text-dim); }
  #send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  #mic-btn {
    background: var(--surface2);
    color: var(--text-sub);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  #mic-btn.recording {
    background: rgba(220,38,38,0.15);
    border-color: #dc2626;
    color: #dc2626;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #voice-status {
    font-size: 11px; color: #dc2626;
    margin-top: 6px; text-align: center;
    min-height: 16px;
  }
  #hint {
    font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: center;
  }

  /* ── WELCOME ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; text-align: center; gap: 12px;
  }
  #welcome .icon { font-size: 40px; }
  #welcome h1 { font-size: 22px; font-weight: 700; }
  #welcome p { font-size: 14px; color: var(--text-sub); line-height: 1.7; max-width: 360px; }

  .user-form {
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; max-width: 320px; margin-top: 4px;
  }
  .user-form input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    text-align: left;
  }
  .user-form input:focus { border-color: var(--accent); }
  .user-form input::placeholder { color: var(--text-dim); }
  .form-note { font-size: 11px; color: var(--text-dim); }

  #start-btn {
    margin-top: 4px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 100%;
    max-width: 320px;
  }
  #start-btn:hover { opacity: 0.85; }

  /* ── REPORT ACTIONS ── */
  .report-actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1; min-width: 120px;
    background: var(--surface2);
    color: var(--text-sub);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.15s;
    display: block;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .action-btn.primary:hover { opacity: 0.85; }

  /* ── INDUSTRY MATCH ── */
  .match-section {
    max-width: 640px; margin: 0 auto 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
  }
  .match-title {
    font-size: 13px; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .match-subtitle {
    font-size: 11px; color: var(--text-dim); margin-bottom: 18px;
  }
  .match-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .match-emoji { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; }
  .match-name  { font-size: 12px; font-weight: 600; width: 120px; flex-shrink: 0; }
  .match-bar-track {
    flex: 1; height: 16px; background: var(--surface2);
    border-radius: 8px; overflow: hidden; position: relative;
  }
  .match-bar-fill {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--accent), #a855f7);
    width: 0; transition: width 0.8s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; padding-left: 8px;
  }
  .match-bar-fill.low   { background: linear-gradient(90deg,#374151,#4b5563); }
  .match-bar-fill.mid   { background: linear-gradient(90deg,#1e40af,#3b82f6); }
  .match-bar-fill.high  { background: linear-gradient(90deg,var(--accent),#a855f7); }
  .match-bar-fill.top   { background: linear-gradient(90deg,#059669,#10b981); }
  .match-pct  { font-size: 12px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }
  .match-pct.top-pct  { color: #10b981; }
  .match-pct.high-pct { color: #a78bfa; }
  .match-actions {
    margin-left: 36px; font-size: 11px; color: var(--text-dim);
    margin-top: -6px; margin-bottom: 10px; line-height: 1.7;
  }
  .match-actions details summary {
    cursor: pointer; color: var(--accent);
    font-size: 11px; user-select: none; list-style: none;
  }
  .match-actions details summary::before { content: "▶ "; font-size: 9px; }
  .match-actions details[open] summary::before { content: "▼ "; }
  .match-actions details p { margin-top: 6px; }
  .match-divider {
    border: none; border-top: 1px dashed var(--border);
    margin: 12px 0;
  }
  .match-worst {
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .match-worst-badge {
    background: rgba(239,68,68,0.1); color: #ef4444;
    border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 700;
  }
  .match-toggle-btn {
    margin-top: 14px; width: 100%; background: none;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; font-size: 11px; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }
  .match-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">CAREER<span>.</span>STRATEGY</div>
  <div style="font-size:11px;color:var(--text-dim)">環境抽出型キャリア設計</div>
</header>

<!-- Stage Bar -->
<div id="stage-bar">
  <div class="stage-item active" id="stage-0"><span class="stage-dot"></span>開始前</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-1"><span class="stage-dot"></span>家庭環境</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-2"><span class="stage-dot"></span>バイト/日常</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-3"><span class="stage-dot"></span>人間関係</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-4"><span class="stage-dot"></span>自己認識</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-5"><span class="stage-dot"></span>エネルギー</div>
  <span class="stage-sep">›</span>
  <div class="stage-item" id="stage-6"><span class="stage-dot"></span>戦略レポート</div>
</div>

<!-- Chat -->
<div id="chat-wrap">
  <div id="welcome">
    <div class="icon">🎯</div>
    <h1>キャリア戦略設計</h1>
    <p>普通の就活相談じゃないです。<br>今いる環境を見直し、そこから戦略を作ります。</p>
    <div class="user-form">
      <input type="text"  id="input-name"  placeholder="名前（任意）" autocomplete="name">
      <input type="email" id="input-email" placeholder="メールアドレス（成長記録の保存に使用）" autocomplete="email">
      <p class="form-note">※ メール・名前以外の個人情報は一切不要です</p>
    </div>
    <button id="start-btn" onclick="startChat()">対話を始める</button>
    <p class="form-note" style="margin-top:4px">
      以前使ったことがある方は <a href="/history" style="color:var(--accent)">成長履歴を見る</a>
    </p>
  </div>
</div>

<!-- Input -->
<div id="input-area" style="display:none">
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="答えを入力してください…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="mic-btn" onclick="toggleVoice()" title="音声入力">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white"/>
      </svg>
    </button>
  </div>
  <div id="voice-status"></div>
  <div id="hint">マイクボタンで音声入力 / Enter で送信 / Shift+Enter で改行</div>
</div>

<script>
let messages = [];
let isTyping = false;
let currentStage = 0;
let recognition = null;
let isRecording = false;
let finalTranscript = '';
let sessionStart = null;
let turnCount = 0;
let currentUser = { name: '', email: '' }; // 登録ユーザー情報
let lastReportText = ''; // レポート全文（メール送信用）

// Stage markers: AI outputs [STAGE:N] when transitioning
const stageNames = ['開始前','家庭環境','バイト/日常','人間関係','自己認識','エネルギー','戦略レポート'];

async function startChat() {
  const name  = document.getElementById('input-name').value.trim();
  const email = document.getElementById('input-email').value.trim();
  currentUser = { name, email };

  // メールアドレスがあればサーバーに登録
  if (email) {
    await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email })
    }).catch(() => {});
  }

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('input-area').style.display = 'block';
  document.getElementById('chat-wrap').style.display = 'block';
  sessionStart = Date.now();

  await sendToAI([{ role: 'user', content: 'スタート' }]);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addMessage(role, content) {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
  avatar.textContent = role === 'ai' ? 'AI' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatContent(content);

  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function formatContent(text) {
  // Convert markdown-ish formatting
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,2} (.+)$/gm, '<h2>$1</h2>')
    .replace(/^#{3,4} (.+)$/gm, '<h3>$1</h3>')
    .replace(/^■ (.+)$/gm, '<h3>$1</h3>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai-avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function updateStageBar(stage) {
  for (let i = 0; i <= 6; i++) {
    const el = document.getElementById(`stage-${i}`);
    if (!el) continue;
    el.className = 'stage-item';
    if (i < stage) el.classList.add('done');
    else if (i === stage) el.classList.add('active');
  }
}

async function sendToAI(msgs) {
  if (isTyping) return;
  isTyping = true;
  document.getElementById('send-btn').disabled = true;

  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });

    const data = await res.json();
    removeTyping();

    if (data.error || !data.content) {
      addMessage('ai', `エラーが発生しました: ${data.error?.message || JSON.stringify(data)}`);
    } else {
      let aiText = data.content[0].text;

      // Detect [STAGE:N] marker and remove from display
      const stageMatch = aiText.match(/\[STAGE:(\d)\]/);
      if (stageMatch) {
        const s = parseInt(stageMatch[1]);
        if (s > currentStage) {
          currentStage = s;
          updateStageBar(currentStage);
        }
        aiText = aiText.replace(/\[STAGE:\d\]\s*/g, '');

        // Stage 6 = report complete → save session data
        if (s === 6) saveSessionData(aiText);
      }

      // Safety: strip role-label lines the AI might have hallucinated
      aiText = aiText.replace(/^(user|User|us|Us|use|Use|model|Model|assistant|Assistant|ユーザー)[^\n]*\n?/gm, '').trim();

      turnCount++;
      messages.push({ role: 'assistant', content: aiText });
      addMessage('ai', aiText);
    }
  } catch (e) {
    removeTyping();
    addMessage('ai', `通信エラー: ${e.message}`);
  }

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

// レポートテキストからスコアと思考パターンを抽出してサーバーに保存
function saveSessionData(reportText) {
  lastReportText = reportText;

  const scoreMatch = reportText.match(/★([\d.]+)\s*\/\s*5/);
  const score = scoreMatch ? parseFloat(scoreMatch[1]) : null;

  const patternMatch = reportText.match(/思考パターン[\s\S]{0,30}\n+([^\n]{4,40})/);
  const pattern = patternMatch ? patternMatch[1].replace(/[*#■]/g, '').trim() : '';

  const durationMin = sessionStart ? Math.round((Date.now() - sessionStart) / 60000) : 0;

  fetch('/api/save-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: currentUser.email,
      name:  currentUser.name,
      score, pattern,
      stages: 6, turnCount, durationMin,
      reportText
    })
  }).catch(() => {});

  // レポート完了後にアクションボタン → 業界マッチを表示
  setTimeout(() => showReportActions(score), 300);
  setTimeout(() => showIndustryMatch(score, pattern), 600);
}

// 業界マッチングセクションの表示
async function showIndustryMatch(score, pattern) {
  try {
    const res = await fetch('/api/match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ score, pattern })
    });
    const data = await res.json();
    if (!data.top) return;

    const wrap = document.getElementById('chat-wrap');
    const section = document.createElement('div');
    section.className = 'match-section';

    // Top 3 rows
    const topRows = data.top.map((ind, i) => {
      const colorClass = ind.match >= 75 ? 'top' : ind.match >= 55 ? 'high' : 'mid';
      const pctClass   = ind.match >= 75 ? 'top-pct' : ind.match >= 55 ? 'high-pct' : '';
      const actions    = ind.levelUpActions
        .map(a => `<p>• ${a}</p>`).join('');
      return `
        <div class="match-row">
          <div class="match-emoji">${ind.emoji}</div>
          <div class="match-name">${ind.name}</div>
          <div class="match-bar-track">
            <div class="match-bar-fill ${colorClass}" data-pct="${ind.match}" style="width:0%"></div>
          </div>
          <div class="match-pct ${pctClass}">${ind.match}%</div>
        </div>
        <div class="match-actions">
          <details>
            <summary>今からできること</summary>
            ${actions}
          </details>
        </div>
      `;
    }).join('');

    // All remaining rows (hidden initially)
    const restRows = data.all.slice(3).map(ind => {
      const colorClass = ind.match >= 55 ? 'mid' : 'low';
      return `
        <div class="match-row" style="opacity:0.6">
          <div class="match-emoji">${ind.emoji}</div>
          <div class="match-name">${ind.name}</div>
          <div class="match-bar-track">
            <div class="match-bar-fill ${colorClass}" data-pct="${ind.match}" style="width:0%"></div>
          </div>
          <div class="match-pct">${ind.match}%</div>
        </div>
      `;
    }).join('');

    section.innerHTML = `
      <div class="match-title">🎯 業界マッチング</div>
      <div class="match-subtitle">あなたの思考パターンと環境抽出力スコアから算出しました</div>
      ${topRows}
      <hr class="match-divider">
      <div class="match-worst">
        <span class="match-worst-badge">現状最遠</span>
        ${data.worst.emoji} ${data.worst.name}（${data.worst.match}%）— ${data.worst.note}
      </div>
      <div id="rest-rows" style="display:none;margin-top:12px">${restRows}</div>
      <button class="match-toggle-btn" onclick="toggleRest(this)">▼ 全業界を見る</button>
    `;

    wrap.appendChild(section);
    wrap.scrollTop = wrap.scrollHeight;

    // Animate bars after render
    requestAnimationFrame(() => {
      setTimeout(() => {
        section.querySelectorAll('.match-bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 100);
    });
  } catch (e) {
    console.error('match error', e);
  }
}

function toggleRest(btn) {
  const rest = document.getElementById('rest-rows');
  const open = rest.style.display === 'none';
  rest.style.display = open ? 'block' : 'none';
  btn.textContent = open ? '▲ 閉じる' : '▼ 全業界を見る';
  if (open) {
    // Animate newly revealed bars
    requestAnimationFrame(() => {
      setTimeout(() => {
        rest.querySelectorAll('.match-bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 50);
    });
  }
}

// レポート完了後に表示するボタン群
function showReportActions(score) {
  const wrap = document.getElementById('chat-wrap');
  const div  = document.createElement('div');
  div.style.cssText = 'max-width:600px;margin:0 auto 20px;padding:0 4px;';

  const historyUrl = currentUser.email
    ? `/history?email=${encodeURIComponent(currentUser.email)}`
    : '/history';

  const mailSubject = encodeURIComponent('キャリア戦略レポート');
  const mailBody    = encodeURIComponent(
    `${currentUser.name ? currentUser.name + 'さんの' : ''}キャリア戦略レポート\n\n` +
    lastReportText.replace(/<[^>]+>/g, '')
  );
  const mailHref = currentUser.email
    ? `mailto:${currentUser.email}?subject=${mailSubject}&body=${mailBody}`
    : `mailto:?subject=${mailSubject}&body=${mailBody}`;

  div.innerHTML = `
    <div class="report-actions">
      <a href="${mailHref}" class="action-btn">📧 メールで受け取る</a>
      <a href="${historyUrl}" class="action-btn">📈 成長履歴を見る</a>
      <button onclick="location.reload()" class="action-btn primary">もう一度やる</button>
    </div>
  `;

  wrap.scrollTop = wrap.scrollHeight;
}

function toggleVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voice-status').textContent = '※ このブラウザは音声入力に対応していません（Chromeを使用してください）';
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  const micBtn = document.getElementById('mic-btn');
  const input = document.getElementById('user-input');
  const status = document.getElementById('voice-status');
  finalTranscript = ''; // 録音開始時にリセット

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    status.textContent = '🎤 話してください… （マイクボタンで停止）';
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim = e.results[i][0].transcript;
      }
    }
    input.value = finalTranscript + interim;
    autoResize(input);
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    status.textContent = '';
    // finalTranscriptが送信時にクリアされていたら空文字のまま
    input.value = finalTranscript.trim();
    autoResize(input);
    if (!isTyping) input.focus();
  };

  recognition.onerror = (e) => {
    isRecording = false;
    micBtn.classList.remove('recording');
    status.textContent = `音声入力エラー: ${e.error}`;
  };

  recognition.start();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  // 音声認識が動いていたら停止し、transcriptをリセット（onendで再セットされないように）
  if (isRecording && recognition) {
    finalTranscript = '';
    recognition.stop();
  }

  input.value = '';
  input.style.height = 'auto';
  finalTranscript = ''; // onendが後から発火しても空になる

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  await sendToAI(messages);
}
